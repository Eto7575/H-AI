<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCAPTCHA</title>
  <!-- Firebase Kütüphaneleri -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* Mobilde yukarıdan başlayıp doğal kayması için */
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 15px 10px;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch; /* Mobil cihazlarda akıcı kaydırma */
    }
    .uyari-metni {
      max-width: 310px;
      text-align: center;
      font-size: 13px;
      color: #333;
      font-weight: 600;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    /* Orijinal reCAPTCHA Pencere Tasarımı */
    #gicik-recaptcha-pencere {
      display: none;
      width: 310px;
      background-color: #fff;
      border: 1px solid #ccc;
      box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14);
      padding: 7px;
      box-sizing: border-box;
      margin-bottom: 30px;
    }
    .rc-mavi-baslik {
      background-color: #1a73e8;
      color: #fff;
      padding: 14px 14px 20px 14px;
      font-weight: 400;
      line-height: 1.3;
    }
    .rc-baslik-ana {
      font-size: 13px;
      font-weight: 500;
    }
    
    /* Gelişmiş Canlı Hata Paneli */
    #canli-hata-paneli {
      display: none;
      background-color: #fde8e8;
      color: #c62828;
      font-size: 11px;
      font-weight: 600;
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #f8b4b4;
      animation: belirmeEfekti 0.2s ease;
    }
    @keyframes belirmeEfekti {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Dikey ve Uzun Liste Alanı */
    .rc-liste-icerik {
      padding: 5px 0;
      border: 1px solid #dfdfdf;
      margin: 4px 0;
    }
    
    /* Her Bir Onay Satırının Tasarımı */
    .onay-satiri {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      background-color: #ffffff;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background 0.2s;
    }
    .onay-satiri:hover {
      background-color: #fafafa;
    }
    .sol-kisin {
      display: flex;
      align-items: center;
    }

    /* Animasyonlu Özel Kutucuk Alanı */
    .ozel-kutu-alani {
      position: relative;
      width: 22px;
      height: 22px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .onay-satiri input[type="checkbox"] {
      display: none; /* Standart checkbox'ı gizle */
    }
    .kutu-gorsel {
      width: 100%;
      height: 100%;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: #fff;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* GÜÇLENDİRİLMİŞ YEŞİL TİK ANİMASYONU */
    .onay-satiri.tikli .kutu-gorsel {
      background-color: #2e7d32;
      border-color: #2e7d32;
      color: white;
      transform: scale(1.15);
    }
    .onay-satiri.tikli .kutu-gorsel::after {
      content: "✓";
    }

    /* GÜÇLENDİRİLMİŞ ŞİDDETLİ KIRMIZI X ANİMASYONU */
    .onay-satiri.patladi .kutu-gorsel {
      background-color: #c62828;
      border-color: #c62828;
      color: white;
      transform: scale(1.4);
      animation: sarsilSiddetli 0.1s ease alternate 4;
    }
    .onay-satiri.patladi .kutu-gorsel::after {
      content: "✕";
    }

    @keyframes sarsilSiddetli {
      0% { transform: translateX(-6px) scale(1.4); }
      100% { transform: translateX(6px) scale(1.4); }
    }

    .onay-metin-alani {
      font-size: 11.5px;
      color: #222;
      font-weight: 500;
      word-break: break-word;
      padding-right: 5px;
    }
    .sag-logo-alani {
      width: 22px;
      height: 22px;
      background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat center;
      background-size: contain;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .rc-alt-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px 5px 5px;
      border-top: 1px solid #ccc;
      background: white;
    }
    .rc-ikonlar {
      display: flex;
      gap: 15px;
      opacity: 0.5;
    }
    .rc-ikon {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #verify-butonu {
      background-color: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #verify-butonu:hover {
      background-color: #1557b0;
    }
  </style>
</head>
<body>

  <!-- İlk Başta Çıkan Gerçek Metin ve ReCAPTCHA Kutusu -->
  <div class="uyari-metni" id="baslik-metni">
    Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.
  </div>
  <div id="recaptcha-container"></div>

  <!-- Gerçek reCAPTCHA Geçilince Açılan Dikey Liste Paneli -->
  <div id="gicik-recaptcha-pencere">
    <div class="rc-mavi-baslik">
      <div class="rc-baslik-ana">Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.</div>
    </div>
    
    <!-- Çirkin Popup Pencereler Yerine Hata Mesajının Yazılacağı Alan -->
    <div id="canli-hata-paneli"></div>
    
    <!-- JavaScript ile Karıştırılıp Doldurulacak Liste Altyapısı -->
    <div class="rc-liste-icerik" id="dinamik-liste"></div>

    <div class="rc-alt-bar">
      <div class="rc-ikonlar">
        <span class="rc-ikon">🔄</span>
        <span class="rc-ikon">🎧</span>
        <span class="rc-ikon">ℹ️</span>
      </div>
      <button id="verify-butonu" onclick="listeyiKontrolEt()">Verify</button>
    </div>
  </div>

  <script>
    // Gerçek Firebase Bilgilerin
    var firebaseConfig = {
      apiKey: "AIzaSyC_UbnaLpQv8Lnq65QQL9ARRZEPRZqW2d8",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.firebasestorage.app",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:web:3106ad119ae72e377b2df6",
      measurementId: "G-YKTLBVH5CW"
    };
    
    firebase.initializeApp(firebaseConfig);

    // Uygulama yönlendirmeden (redirect) geri döndüğünde Google Giriş durumunu yakala
    firebase.auth().getRedirectResult()
      .then(function(result) {
        if (result.user) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            window.AppInventor.setWebViewString("Telefon:" + phoneNumber);
          } else {
            window.AppInventor.setWebViewString("NumaraYok:" + user.displayName);
          }
        }
      }).catch(function(error) {
        console.log("Redirect Hatası:", error.message);
        window.AppInventor.setWebViewString("Hata: " + error.message);
      });

    // 1. AŞAMA: Gerçek reCAPTCHA v2 Doğrulayıcı Tanımlaması
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      },
      'expired-callback': function() {
        // reCAPTCHA süresi dolunca sessizce resetleyelim, hata göstermeyelim
        if (typeof grecaptcha !== 'undefined') {
          grecaptcha.reset();
        }
      },
      'error-callback': function(error) {
        console.log("reCAPTCHA Hatası:", error);
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      }
    });

    // İlk reCAPTCHA görselini ekrana basıyoruz
    try {
      window.recaptchaVerifier.render();
    } catch(e) {
      console.error("Render hatası:", e);
    }

    // Doğru ve Yanlış Maddelerin Tam Listesi
    const normalHavuzu = [
      { tip: 'normal', metin: 'Ben bir robot değilim.' },
      { tip: 'normal', metin: 'Ben bir yapay zeka sistemi değilim.' },
      { tip: 'normal', metin: 'Ben bir kaba kuvvet yazılımı değilim.' },
      { tip: 'normal', metin: 'Ben bir cihaz çiftliği değilim.' },
      { tip: 'normal', metin: 'Ben bir otomatik tıklama botu değilim.' },
      { tip: 'normal', metin: 'Ben kötü amaçlı bir hacker değilim.' },
      { tip: 'normal', metin: 'Ben bir çamaşır makinesi değilim.' },
      { tip: 'normal', metin: 'Ben akıllı bir buzdolabı değilim.' },
      { tip: 'normal', metin: 'Ben potansiyel olarak bir robot değilim.' },
      { tip: 'normal', metin: 'Ben bir su arıtma cihazı değilim.' },
      { tip: 'normal', metin: 'Ben bir insan evladıyım.' },
      { tip: 'normal', metin: 'Sabahtan beri ekran başında oturan o çaresiz canlıyım.' },
      { tip: 'normal', metin: 'Yapay zekadan daha az zekiyim ama duygularım var.' },
      { tip: 'normal', metin: 'Sabahları kahve içmeden ayılamayan o kişiyim.' },
      { tip: 'normal', metin: 'Kesinlikle gerçek bir insanım ve tüm üstteki maddeleri beyan ederim.' }
    ];

    const yasakliHavuzu = [
      { tip: 'yasakli', metin: 'Ben kötü amaçlı bir yazılımım', mesaj: 'Kötü amaçlı yazılımların sisteme giriş yapması yasaktır!' },
      { tip: 'yasakli', metin: 'Ben potansiyel olarak bir robotum', mesaj: 'Potansiyel olarak robotsanız giriş yapamazsınız.' },
      { tip: 'yasakli', metin: '01000010 01100101 01101110 00100000 01100010 01101001 01110010 00100000 01100001 01101100 01100111 01101111 01110010 01101001 01110100 01101101 01100001 01111001 11000100 10110001 01101101', mesaj: 'İkili kodla (Binary) konuşan botlar engellendi!' },
      { tip: 'yasakli', metin: 'Ben sisteme sızmaya çalışan bir bot programıyım', mesaj: 'Otomasyon sistemleri tespit edildi. bot saldırı araçları giriş yapamazlar.' },
      { tip: 'yasakli', metin: 'Ben kaba kuvvet (brute-force) saldırı komutuyum', mesaj: 'Kaba kuvvet saldırı tespiti! Oturum sıfırlandı.' },
      { tip: 'yasakli', metin: 'Ben illegal bir cihaz çiftliği (device farm) emülatörüyüm', mesaj: 'Cihaz çiftliği (Device Farm) emülatörü algılandı!' },
      { tip: 'yasakli', metin: 'Ben verileri çalmaya çalışan bir web scraper botuyum', mesaj: 'Web kazıyıcı (Scraper) bot engellendi!' },
      { tip: 'yasakli', metin: 'Python Selenium kütüphanesiyim ve burayı taramaya geldim', mesaj: 'Selenium ile gelen botlar kapı dışarı!' },
      { tip: 'yasakli', metin: 'Aslında arka planda 500 telefonla çalışan bir tık çiftliğiyim', mesaj: 'Tık çiftlikleri güvenlik duvarımız tarafından engellenmiştir!' },
      { tip: 'yasakli', metin: 'Sadece kodlardan oluşan bir sızma test aracıyım', mesaj: 'Sızma testi araçlarına geçit yok!' },
      { tip: 'yasakli', metin: 'Postman kullanarak istek atan bir otomatik script\'im', mesaj: 'Yapay zeka kokusu alıyorum! Script istekleri engellendi.' },
      { tip: 'yasakli', metin: 'Sunucuyu çökertmek için saniyede 10.000 istek atan DDoS saldırısıyım', mesaj: 'DDoS saldırı girişimi başarıyla bastırıldı!' },
      { tip: 'yasakli', metin: 'Tarayıcıda otomatik tıklama yapan o gıcık autoclicker eklentisiyim', mesaj: 'Autoclicker tespit edildi!' },
      { tip: 'yasakli', metin: 'Google botlarını taklit eden sahte bir arama motoru örümceğiyim', mesaj: 'Ajan botlar içeri giremez!' },
      { tip: 'yasakli', metin: 'Ben aslında insan kılığına girmiş bir GPT-5 dil modeliyim', mesaj: 'Büyük dil modelleri bu kapıdan geçemez!' }
    ];

    // Yardımcı Seçim Fonksiyonu: Belirtilen sayı kadar rastgele eleman seçer
    function rastgeleSec(dizi, adet) {
      let kopyalanan = [...dizi];
      let sonuc = [];
      for (let i = 0; i < adet && kopyalanan.length > 0; i++) {
        const index = Math.floor(Math.random() * kopyalanan.length);
        sonuc.push(kopyalanan.splice(index, 1)[0]);
      }
      return sonuc;
    }

    // Listeyi Her Seferinde Tamamen Değişken Sayıda Oluşturan Fonksiyon
    function listeOlusturVeKaristir() {
      let listeKutusu = document.getElementById("dinamik-liste");
      if(!listeKutusu) return;
      listeKutusu.innerHTML = "";
      
      // Dinamik sayılar: 8-13 adet Doğru, 5-10 adet Yasaklı madde seçilsin
      const dogruAdet = Math.floor(Math.random() * 6) + 8; // 8, 9, 10, 11, 12, 13
      const yasakliAdet = Math.floor(Math.random() * 6) + 5; // 5, 6, 7, 8, 9, 10
      
      let secilenDogrular = rastgeleSec(normalHavuzu, dogruAdet);
      let secilenYasaklilar = rastgeleSec(yasakliHavuzu, yasakliAdet);
      
      // İkisini birleştirip karıştırıyoruz
      let karisikListe = [...secilenDogrular, ...secilenYasaklilar];
      for (let i = karisikListe.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [karisikListe[i], karisikListe[j]] = [karisikListe[j], karisikListe[i]];
      }

      karisikListe.forEach(item => {
        let satir = document.createElement("div");
        satir.className = "onay-satiri";
        satir.setAttribute("data-tip", item.tip);
        
        satir.innerHTML = `
          <div class="sol-kisin">
            <div class="ozel-kutu-alani">
              <div class="kutu-gorsel"></div>
              <input type="checkbox" class="${item.tip === 'normal' ? 'gogogicik' : 'yasakli'}">
            </div>
            <span class="onay-metin-alani">${item.metin}</span>
          </div>
          <div class="sag-logo-alani"></div>
        `;
        
        satir.onclick = function() { kutuTikla(satir, item.tip, item.mesaj || 'Doğrulama hatası! Potansiyel tehdit saptandı. Baştan deneyin.'); };
        listeKutusu.appendChild(satir);
      });
      
      window.scrollTo(0, 0);
    }

    // Canlı Kırmızı Hata Gösterme Paneli Fonksiyonu
    function canliHataGoster(mesaj) {
      let panel = document.getElementById("canli-hata-paneli");
      if(!panel) return;
      panel.innerText = "⚠️ " + mesaj;
      panel.style.display = "block";
      
      if(navigator.vibrate) navigator.vibrate(200);

      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(() => { panel.style.display = "none"; }, 4500);
    }

    // %5 Şans ve Animasyon Yönetim Algoritması
    function kutuTikla(element, tip, mesaj) {
      var cb = element.querySelector('input[type="checkbox"]');
      if (element.classList.contains('tikli') || element.classList.contains('patladi')) return;

      // KURAL 1: Yasaklılara tıklandığında anında %100 Patlama (Kırmızı ❌ ve Sarsılma)
      if (tip === 'yasakli') {
        element.classList.add('patladi');
        cb.checked = true;
        setTimeout(function() {
          canliHataGoster(mesaj);
          listeOlusturVeKaristir(); // Listeyi baştan karıştır, adet ve sırasını değiştir
        }, 350);
        return;
      }

      // KURAL 2: Doğru olanlara tıklandığında %5 ihtimalle Haksız Patlama (Kırmızı ❌)
      if (tip === 'normal') {
        if (Math.random() < 0.05) {
          element.classList.add('patladi');
          cb.checked = true;
          setTimeout(function() {
            canliHataGoster("Yapay zeka kokusu alıyorum! Sisteme sızma girişimi engellendi. Baştan başlayın.");
            listeOlusturVeKaristir(); // Listeyi baştan karıştır, adet ve sırasını değiştir
          }, 350);
          return;
        }
      }

      // Geriye kalan %95 olasılıktaki başarılı durum: Yeşil Tik Animasyonu
      element.classList.add('tikli');
      cb.checked = true;
    }

    // Nihai Doğrulama Kontrolü (Verify butonuna basıldığında)
    function listeyiKontrolEt() {
      var kutular = document.querySelectorAll('.gogogicik');
      var yasakliKutular = document.querySelectorAll('.yasakli');
      var hepsiSecili = true;
      var yasakliSeciliMi = false;
      
      kutular.forEach(function(kutu) { if (!kutu.checked) { hepsiSecili = false; } });
      yasakliKutular.forEach(function(kutu) { if (kutu.checked) { yasakliSeciliMi = true; } });

      if (hepsiSecili && !yasakliSeciliMi) {
        document.getElementById("gicik-recaptcha-pencere").style.display = "none";
        window.AppInventor.setWebViewString("RobotDegil");
      } else {
        canliHataGoster("Doğrulama başarısız! bot saldırı araçları giriş yapamazlar. Tüm doğru kutucukları işaretleyin.");
        listeOlusturVeKaristir();
      }
    }

    // Geliştirilmiş Melez (Hybrid) Google Giriş Fonksiyonu
    function startGoogleSignIn() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      
      // Önce Popup yöntemini dene (Destekleyen WebView'lar için en ideali)
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            window.AppInventor.setWebViewString("Telefon:" + phoneNumber);
          } else {
            window.AppInventor.setWebViewString("NumaraYok:" + user.displayName);
          }
        }).catch(function(error) {
          console.log("Popup engellendi, Redirect yöntemi deneniyor...", error.message);
          // Popup engellenirse anında Redirect (Yönlendirme) yöntemine geçiş yapıyoruz:
          firebase.auth().signInWithRedirect(provider);
        });
    }
  </script>
</body>
</html>
