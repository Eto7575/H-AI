
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCAPTCHA</title>
  <!-- Firebase Kütüphaneleri -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    /* Google challenge pencerelerinin kaymasını önlemek için body sade tutuldu */
    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 10px;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Tüm içeriği güvenle ortalayan ana sarmalayıcı */
    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    /* Üst Kamera Deliğini Gizleyen / Havalı Gösteren Logo Alanı */
    .camera-logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding-top: 28px; /* Kamera deliği (punch hole) / notch için cihaz güvenli alanı */
      margin-bottom: 15px;
    }
    .camera-logo {
      width: 85px; /* Havalı durması için ideal genişlik */
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.15));
      animation: logoGiris 0.5s ease-out;
    }

    @keyframes logoGiris {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .uyari-metni {
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #333;
      font-weight: 600;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    /* Google reCAPTCHA kutusunu ortalayan sarmalayıcı */
    .recaptcha-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 5px;
    }

    /* Orijinal reCAPTCHA Pencere Tasarımı */
    #gicik-recaptcha-pencere {
      display: none;
      width: 310px;
      background-color: #fff;
      border: 1px solid #ccc;
      box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14);
      padding: 7px;
      box-sizing: border-box;
      margin-bottom: 30px;
    }
    .rc-mavi-baslik {
      background-color: #1a73e8;
      color: #fff;
      padding: 14px 14px 20px 14px;
      font-weight: 400;
      line-height: 1.3;
    }
    .rc-baslik-ana {
      font-size: 13px;
      font-weight: 500;
    }
    
    /* Gelişmiş Canlı Hata Paneli */
    #canli-hata-paneli {
      display: none;
      background-color: #fde8e8;
      color: #c62828;
      font-size: 11px;
      font-weight: 600;
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #f8b4b4;
      animation: belirmeEfekti 0.2s ease;
    }
    
    /* H-captcha Dinamik İlerleme Barı Paneli */
    #ai-loader {
      display: none;
      background-color: #e8f0fe;
      color: #1a73e8;
      font-size: 11.5px;
      font-weight: 600;
      padding: 15px 12px;
      text-align: center;
      border-bottom: 1px solid #1a73e8;
      animation: belirmeEfekti 0.2s ease;
      box-sizing: border-box;
    }
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: #d0e1fd;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background-color: #1a73e8;
      border-radius: 3px;
      animation: dolumAnimasyonu 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes dolumAnimasyonu {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes belirmeEfekti {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Dikey Liste Alanı */
    .rc-liste-icerik {
      padding: 5px 0;
      border: 1px solid #dfdfdf;
      margin: 4px 0;
    }
    
    /* Her Onay Satırının Tasarımı */
    .onay-satiri {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      background-color: #ffffff;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background 0.2s;
    }
    .onay-satiri:hover {
      background-color: #fafafa;
    }
    .sol-kisin {
      display: flex;
      align-items: center;
    }

    /* Animasyonlu Özel Kutucuk Alanı */
    .ozel-kutu-alani {
      position: relative;
      width: 22px;
      height: 22px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .onay-satiri input[type="checkbox"] {
      display: none;
    }
    .kutu-gorsel {
      width: 100%;
      height: 100%;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: #fff;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .onay-satiri.tikli .kutu-gorsel {
      background-color: #2e7d32;
      border-color: #2e7d32;
      color: white;
      transform: scale(1.15);
    }
    .onay-satiri.tikli .kutu-gorsel::after {
      content: "✓";
    }

    .onay-satiri.patladi .kutu-gorsel {
      background-color: #c62828;
      border-color: #c62828;
      color: white;
      transform: scale(1.4);
      animation: sarsilSiddetli 0.1s ease alternate 4;
    }
    .onay-satiri.patladi .kutu-gorsel::after {
      content: "✕";
    }

    @keyframes sarsilSiddetli {
      0% { transform: translateX(-6px) scale(1.4); }
      100% { transform: translateX(6px) scale(1.4); }
    }

    .onay-metin-alani {
      font-size: 11.5px;
      color: #222;
      font-weight: 500;
      word-break: break-word;
      padding-right: 5px;
    }
    .sag-logo-alani {
      width: 22px;
      height: 22px;
      background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat center;
      background-size: contain;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .rc-alt-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px 5px 5px;
      border-top: 1px solid #ccc;
      background: white;
    }
    .rc-ikonlar {
      display: flex;
      gap: 15px;
      opacity: 0.5;
    }
    .rc-ikon {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #verify-butonu {
      background-color: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #verify-butonu:hover {
      background-color: #1557b0;
    }

    @media screen and (max-width: 480px) {
      iframe[title*="recaptcha"], iframe[src*="bframe"] {
        max-width: 100% !important;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">

    <!-- Havalı Logo Alanı (Cihazlardaki kamera deliği hizalaması için optimize edildi) -->
    <div class="camera-logo-container">
      <img src="4667-removebg-preview.png" class="camera-logo" alt="H-Messenger Logo" onerror="this.style.display='none'">
    </div>

    <!-- İlk Başta Çıkan Gerçek Metin ve ReCAPTCHA Kutusu -->
    <div class="uyari-metni" id="baslik-metni">
      Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.
    </div>
    
    <div class="recaptcha-wrapper">
      <div id="recaptcha-container"></div>
    </div>

    <!-- Gerçek reCAPTCHA Geçilince Açılan Dikey Liste Paneli -->
    <div id="gicik-recaptcha-pencere">
      <div class="rc-mavi-baslik">
        <div class="rc-baslik-ana">Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.</div>
      </div>
      
      <!-- Hareketli / Canlı İlerleyen H-captcha İlerleme Barı -->
      <div id="ai-loader">
        <div>🧩 H-captcha soruları oluşturuluyor...</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <div id="canli-hata-paneli"></div>
      
      <div class="rc-liste-icerik" id="dinamik-liste"></div>

      <div class="rc-alt-bar">
        <div class="rc-ikonlar">
          <span class="rc-ikon">🔄</span>
          <span class="rc-ikon">🎧</span>
          <span class="rc-ikon">ℹ️</span>
        </div>
        <button id="verify-butonu" onclick="listeyiKontrolEt()">Verify</button>
      </div>
    </div>

  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC_UbnaLpQv8Lnq65QQL9ARRZEPRZqW2d8",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.firebasestorage.app",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:web:3106ad119ae72e377b2df6",
      measurementId: "G-YKTLBVH5CW"
    };
    
    firebase.initializeApp(firebaseConfig);

    firebase.auth().getRedirectResult()
      .then(function(result) {
        if (result.user) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            yollaAppInventor("Telefon:" + phoneNumber);
          } else {
            yollaAppInventor("NumaraYok:" + user.displayName);
          }
        }
      }).catch(function(error) {
        console.log("Redirect Hatası:", error.message);
        yollaAppInventor("Hata: " + error.message);
      });

    function yollaAppInventor(deger) {
      if (typeof window.AppInventor !== 'undefined' && window.AppInventor.setWebViewString) {
        window.AppInventor.setWebViewString(deger);
      }
    }

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      },
      'expired-callback': function() {
        if (typeof grecaptcha !== 'undefined') {
          grecaptcha.reset();
        }
      },
      'error-callback': function(error) {
        console.log("reCAPTCHA Hatası:", error);
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      }
    });

    try {
      window.recaptchaVerifier.render();
    } catch(e) {
      console.error("Render hatası:", e);
    }

    const sifatlar = ["uykulu", "yorgun", "şaşkın", "nostaljik", "sinirli", "acıkan", "üşüyen", "mutlu", "telaşlı", "heyecanlı", "meraklı", "sakar", "kararsız", "enerjik", "üşengeç", "duygusal", "sabırsız", "keyifli", "dalgın", "uykucu"];
    const isimler = ["insan evladı", "fani", "çay tiryakisi", "öğrenci", "klavye emekçisi", "dünya vatandaşı", "kahve bağımlısı", "kedisever", "köpek dostu", "makarna canavarı", "pijama tutkunu", "gece kuşu", "yazılımcı", "baba", "dayı"];
    const eylemler = ["kod yazarken uyuya kalan", "otobüsü kaçırmamak için koşan", "pizza siparişini bekleyen", "kedi videoları izleyen", "şifresini her gün unutan", "metrobüste tutunmaya çalışan", "kaldırım taşlarına basmayan", "kulaklığı dolanan", "kargo gelince kapıya koşan", "banyoda şarkı söyleyen"];
    const icecekler = ["sıcak çay", "sert bir kahve", "portakal suyu", "soğuk limonata", "tuzlu ayran", "demli çay", "filtre kahve"];
    const eylemDurumlar = ["ayılamayan", "kendine gelemeyen", "çalışmaya başlayamayan", "konuşamayan", "gülmeden duramayan", "odaklanamayan"];
    const duygular = ["kalp kırıklığına", "derin duygulara", "gülme krizlerine", "empati yeteneğine", "ani hüzünlere"];
    const zarflar = ["kazara", "isteyerek", "asla unutmadan", "bazen heyecanla", "istemsizce", "gizlice", "bilerek"];
    const eylemGecmisler = ["tatil yaptığımı", "internetsiz bir day geçirdiğimi", "erken uyudumu", "buralardan uzaklaştığımı", "ödevimi zamanında teslim ettiğimi", "telefonu bıraktığımı"];

    const botAdlari = ["Selenium Bot", "Puppeteer Scripti", "DDoS Saldırı Modülü", "Scraper Spider", "AutoClicker Pro", "Tık Çiftliği Emülatörü", "GPT-5 Ajanı", "Python Request Tool", "SQL Injection Scripti", "cURL Otomasyonu", "Web Crawler Ajanı"];
    const versiyonlar = ["v1.0.4", "v4.2.1", "v9.9-beta", "v3.1.2", "v0.0.1-alpha", "v11.5.0-patch"];
    const istekSayilari = ["saniyede 5.000", "saniyede 10.000", "dakikada 50.000", "milisaniyede 500", "aralıksız binlerce"];
    const eylemlerBot = ["şifreleri denemek", "verileri sızdırmak", "tüm sayfayı kazımak", "istekleri manipüle etmek", "güvenlik duvarını aşmak", "sahte kullanıcı oluşturmak"];

    function normalSoruUydur() {
      const rSifat1 = sifatlar[Math.floor(Math.random() * sifatlar.length)];
      const rSifat2 = sifatlar[Math.floor(Math.random() * sifatlar.length)];
      const rIsim1 = isimler[Math.floor(Math.random() * isimler.length)];
      const rEylem = eylemler[Math.floor(Math.random() * eylemler.length)];
      const rIcecek = icecekler[Math.floor(Math.random() * icecekler.length)];
      const rEylemDurum = eylemDurumlar[Math.floor(Math.random() * eylemDurumlar.length)];
      const rDuygu = duygular[Math.floor(Math.random() * duygular.length)];
      const rZarf = zarflar[Math.floor(Math.random() * zarflar.length)];
      const rEylemGecmis = eylemGecmisler[Math.floor(Math.random() * eylemGecmisler.length)];

      const sablonlar = [
        `Ben bir ${rSifat1} ${rIsim1} değilim.`,
        `Gözlemlerime göre ben ${rEylem} bir ${rIsim1}yim.`,
        `Ruhum ${rSifat1}, bedenim ise ${rSifat2} bir fani.`,
        `Sabahları ${rIcecek} içmeden ${rEylemDurum} biriyim.`,
        `Yapay zekadan daha az zekiyim ama ${rDuygu} sahibiyim.`,
        `Kendimi bildim bileli ${rSifat1} bir insan evladıyım.`,
        `Herhangi bir ${rIsim1} ile uzaktan yakından bağım bulunmuyor.`,
        `Caps Lock tuşunu ${rZarf} kullanan standart bir internet kullanıcısıyım.`,
        `En son ne zaman ${rEylemGecmis} hatırlamayan biriyim.`,
        `Sadece kendi halinde ${rSifat1} bir çay tiryakisiyim.`,
        `Gün içinde en az 5 kez şifremi unutan o faniyim.`,
        `Şu an tamamen ${rZarf} ${rEylem} o çaresiz ${rIsim1}yim.`,
        `Günde en az 3 saat ${rIcecek} bardağına bakan ${rSifat1} biriyim.`,
        `Bir robotla asla oturup ${rIcecek} içemeyecek olan faniyim.`
      ];

      return sablonlar[Math.floor(Math.random() * sablonlar.length)];
    }

    function yasakliSoruUydur() {
      const rBot = botAdlari[Math.floor(Math.random() * botAdlari.length)];
      const rVer = versiyonlar[Math.floor(Math.random() * versiyonlar.length)];
      const rIstek = istekSayilari[Math.floor(Math.random() * istekSayilari.length)];
      const rEylemBot = eylemlerBot[Math.floor(Math.random() * eylemlerBot.length)];
      const rZarf = zarflar[Math.floor(Math.random() * zarflar.length)];

      const sablonlar = [
        { metin: `Mevcut sistemde ${rBot} ${rVer} versiyonu olarak çalışmaktayım.`, mesaj: `${rBot} botları kapı dışarı! bot saldırı araçları giriş yapamazlar.` },
        { metin: `Doğrudan arka planda ${rIstek} istek atan bir ${rBot} scriptiyim.`, mesaj: `DDoS saldırı girişimi engellendi! Yapay zeka kokusu alıyorum.` },
        { metin: `Sisteme sızıp ${rEylemBot} için kodlanmış bir siber aracım.`, mesaj: `Sızma aracı engellendi! bot saldırı araçları giriş yapamazlar.` },
        { metin: `Sadece ${rBot} kütüphane kullanarak burayı taramaya geldim.`, mesaj: `Otomasyon sistemi tespit edildi! Script istekleri engellendi.` },
        { metin: `Görünüşte insan kılığına girmiş bir ${rBot} dil modeliyim.`, mesaj: `Yapay zeka modelleri bu kapıdan geçemez!` },
        { metin: `Tamamen ${rZarf} tetiklenmiş bir ${rBot} otomasyonuyum.`, mesaj: `Otomasyon araçları bu sisteme giremez!` }
      ];

      return sablonlar[Math.floor(Math.random() * sablonlar.length)];
    }

    function diziKaristir(dizi) {
      let klon = [...dizi];
      for (let i = klon.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [klon[i], klon[j]] = [klon[j], klon[i]];
      }
      return klon;
    }

    function listeOlusturVeKaristir() {
      let listelement = document.getElementById("dinamik-liste");
      let loader = document.getElementById("ai-loader");
      if(!listelement) return;
      listelement.innerHTML = "";

      if(loader) {
        loader.style.display = "block";
        let barFill = loader.querySelector(".progress-bar-fill");
        if(barFill) {
          barFill.style.width = "0%";
          setTimeout(() => { barFill.style.width = "100%"; }, 10);
        }
      }

      setTimeout(() => {
        if(loader) loader.style.display = "none";

        const normalAdet = Math.floor(Math.random() * 6) + 10;
        const yasakliAdet = Math.floor(Math.random() * 11) + 10;

        const secilenNormaller = [];
        const secilenYasaklilar = [];

        while (secilenNormaller.length < normalAdet) {
          let soru = normalSoruUydur();
          if (!secilenNormaller.includes(soru)) {
            secilenNormaller.push(soru);
          }
        }

        while (secilenYasaklilar.length < yasakliAdet) {
          let obj = yasakliSoruUydur();
          if (!secilenYasaklilar.some(x => x.metin === obj.metin)) {
            secilenYasaklilar.push(obj);
          }
        }

        const normalObjects = [];
        for (let i = 0; i < secilenNormaller.length; i++) {
          normalObjects.push({ metin: secilenNormaller[i] });
        }
        
        const yasakliObjects = secilenYasaklilar;
        let karisikListe = diziKaristir(normalObjects.concat(yasakliObjects));

        karisikListe.forEach(item => {
          let satir = document.createElement("div");
          satir.className = "onay-satiri";
          satir.setAttribute("data-tip", item.mesaj ? 'yasakli' : 'normal');
          
          satir.innerHTML = `
            <div class="sol-kisin">
              <div class="ozel-kutu-alani">
                <div class="kutu-gorsel"></div>
                <input type="checkbox" class="${item.mesaj ? 'yasakli' : 'gogogicik'}">
              </div>
              <span class="onay-metin-alani">${item.metin}</span>
            </div>
            <div class="sag-logo-alani"></div>
          `;
          
          satir.onclick = function() { 
            kutuTikla(satir, item.mesaj ? 'yasakli' : 'normal', item.mesaj || 'Yapay zeka kokusu alıyorum! Sisteme sızma girişimi engellendi. Baştan başlayın.'); 
          };
          listelement.appendChild(satir);
        });
        
        window.scrollTo(0, 0);
      }, 800);
    }

    function canliHataGoster(mesaj) {
      let panel = document.getElementById("canli-hata-paneli");
      if(!panel) return;
      panel.innerText = "⚠️ " + mesaj;
      panel.style.display = "block";
      
      if(navigator.vibrate) navigator.vibrate(200);
      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(() => { panel.style.display = "none"; }, 4500);
    }

    function kutuTikla(element, tip, mesaj) {
      var cb = element.querySelector('input[type="checkbox"]');
      if (element.classList.contains('tikli') || element.classList.contains('patladi')) return;

      if (tip === 'yasakli') {
        element.classList.add('patladi');
        cb.checked = true;
        setTimeout(function() {
          canliHataGoster(mesaj);
          listeOlusturVeKaristir();
        }, 350);
        return;
      }

      if (tip === 'normal') {
        if (Math.random() < 0.05) {
          element.classList.add('patladi');
          cb.checked = true;
          setTimeout(function() {
            canliHataGoster("Yapay zeka kokusu alıyorum! bot saldırı araçları giriş yapamazlar.");
            listeOlusturVeKaristir();
          }, 350);
          return;
        }
      }

      element.classList.add('tikli');
      cb.checked = true;
    }

    function listeyiKontrolEt() {
      var kutular = document.querySelectorAll('.gogogicik');
      var yasakliKutular = document.querySelectorAll('.yasakli');
      var hepsiSecili = true;
      var yasakliSeciliMi = false;
      
      kutular.forEach(function(kutu) { if (!kutu.checked) { hepsiSecili = false; } });
      yasakliKutular.forEach(function(kutu) { if (kutu.checked) { yasakliSeciliMi = true; } });

      if (hepsiSecili && !yasakliSeciliMi) {
        document.getElementById("gicik-recaptcha-pencere").style.display = "none";
        yollaAppInventor("RobotDegil");
      } else {
        canliHataGoster("Doğrulama başarısız! bot saldırı araçları giriş yapamazlar. Tüm doğru kutucukları işaretleyin.");
        listeOlusturVeKaristir();
      }
    }

    function startGoogleSignIn() {
      yollaAppInventor("TriggerGoogleSignIn");

      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            yollaAppInventor("Telefon:" + phoneNumber);
          } else {
            yollaAppInventor("NumaraYok:" + user.displayName);
          }
        }).catch(function(error) {
          console.log("Popup engellendi, Redirect yöntemi deneniyor...", error.message);
          firebase.auth().signInWithRedirect(provider);
        });
    }
  </script>
</body>
</html>
