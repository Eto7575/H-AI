<!DOCTYPE html>
<html> 
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Authentication</title> 
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>

  <div id="recaptcha-container"></div>

  <script>
    // Firebase Bilgilerin
    var firebaseConfig = {
      apiKey: "AIzaSyA0JKTJSmlTZJ3RYwpwWenw4GmpTOaSzx4",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.appspot.com",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:android:651278164866de537b2df6"
    };
    
    firebase.initializeApp(firebaseConfig); 

    // YENİ EKLEDİĞİMİZ YER TAM OLARAK BURASI:
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        // Kullanıcı robot kontrolünü geçtiği an App Inventor'a gizli mesaj gidiyor!
        window.AppInventor.setWebViewString("RobotDegil");
      }
    });

    // İlk açılışta reCAPTCHA kutusunu ekrana çizdiriyoruz
    window.recaptchaVerifier.render();

    var confirmationResultGlobal = null;

    function sendSMS(phoneNumber) {
      var appVerifier = window.recaptchaVerifier;
      firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
        .then(function (confirmationResult) {
          confirmationResultGlobal = confirmationResult;
          window.AppInventor.setWebViewString("KodGonderildi");
        }).catch(function (error) {
          window.AppInventor.setWebViewString("Hata: " + error.message);
          window.recaptchaVerifier.render();
        });
    }

    function verifyCode(otpCode) {
      if(confirmationResultGlobal) {
        confirmationResultGlobal.confirm(otpCode).then(function (result) {
          window.AppInventor.setWebViewString("GirisBasarili");
        }).catch(function (error) {
          window.AppInventor.setWebViewString("Hata: " + error.message);
        });
      }
    }
  </script>
</body>
</html>
