
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-AI Core - Arka Plan Dinleme Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 50%, #111111 0%, #050505 100%);
        }
        .glow-active {
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }
        .glow-listening {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.8);
        }
        .glow-success {
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.5);
            border-color: rgba(34, 197, 94, 0.9);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between font-sans selection:bg-white selection:text-black overflow-x-hidden">

    <!-- Üst Bar -->
    <header class="border-b border-zinc-900/80 bg-black/40 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-white flex items-center justify-center shadow-lg shadow-white/5">
                    <span class="text-black font-black text-base tracking-tighter">H.</span>
                </div>
                <div>
                    <h1 class="font-bold text-base tracking-wider leading-none">H-AI CORE</h1>
                    <p class="text-[8px] text-zinc-500 uppercase tracking-widest mt-1">Arka Plan Dinleme Portalı</p>
                </div>
            </div>
            <div id="service-badge" class="text-[9px] bg-zinc-900 text-zinc-400 px-2.5 py-1 rounded font-mono border border-zinc-800/60 uppercase tracking-widest flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse" id="status-dot"></span>
                <span id="status-text">ÇEVRİMDIŞI</span>
            </div>
        </div>
    </header>

    <!-- Ana Panel -->
    <main class="max-w-xl w-full mx-auto p-4 flex-1 flex flex-col justify-center gap-6">
        
        <!-- Ses Çekirdeği (Görsel Animasyon) -->
        <div class="flex flex-col items-center justify-center py-6">
            <div id="voice-core" class="w-40 h-40 rounded-full border-2 border-zinc-800 bg-black/40 flex items-center justify-center transition-all duration-500 relative cursor-pointer">
                <!-- Arka Plan Dalgaları -->
                <div class="absolute inset-0 rounded-full border border-white/5 animate-ping opacity-20 hidden" id="ripple-1"></div>
                <div class="absolute inset-2 rounded-full border border-blue-500/10 animate-pulse hidden" id="ripple-2"></div>
                
                <div class="text-center z-10">
                    <i class="fa-solid fa-microphone text-3xl text-zinc-650 transition-colors duration-300" id="mic-icon"></i>
                    <p class="text-[9px] text-zinc-500 uppercase tracking-widest mt-2 font-mono" id="core-state-text">DOKUN VE BAŞLAT</p>
                </div>
            </div>
        </div>

        <!-- Hızlı Ayarlar Kartı -->
        <div class="bg-zinc-950/80 border border-zinc-900 rounded-xl p-5 space-y-4">
            <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-sliders text-zinc-500"></i> Servis Parametreleri
            </h2>
            
            <div class="space-y-3">
                <!-- Uyandırma Sözcüğü Tanımı -->
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase tracking-wider block mb-1.5">Uyandırma Anahtarı (Wake Word)</label>
                    <input id="wake-word-input" type="text" value="hey susam" placeholder="Örn: hey susam" 
                           class="w-full bg-black border border-zinc-850 rounded-lg px-4 py-3 text-sm font-semibold focus:outline-none focus:border-white transition-all uppercase tracking-wider text-center text-white">
                </div>

                <!-- Güç Modu Kilidi -->
                <div class="flex justify-between items-center p-3 bg-black/60 rounded-lg border border-zinc-900/60">
                    <div>
                        <h3 class="text-xs font-bold text-zinc-300">Sessiz Güç Kilidi (Audio WakeLock)</h3>
                        <p class="text-[10px] text-zinc-500 mt-0.5">Android'in uygulamayı arka planda uyutmasını engeller.</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="wakelock-toggle" checked class="sr-only peer">
                        <div class="w-9 h-5 bg-zinc-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-zinc-400 after:border-zinc-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-white peer-checked:after:bg-black peer-checked:after:border-black"></div>
                    </label>
                </div>
            </div>

            <!-- Servis Kontrol Butonu -->
            <button id="ctrl-btn" class="w-full bg-white hover:bg-zinc-200 text-black font-bold text-sm py-3.5 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-white/5">
                <i class="fa-solid fa-power-off"></i> Servisi Aktifleştir
            </button>
        </div>

        <!-- Terminal Log Ekranı (Debug Console) -->
        <div class="bg-black border border-zinc-900 rounded-xl p-4 font-mono text-[10px] text-zinc-400 space-y-2 shadow-inner">
            <div class="flex justify-between items-center border-b border-zinc-900 pb-2 mb-2">
                <span class="text-zinc-500 uppercase tracking-wider text-[9px] font-bold">Sistem Günlükleri (Console Log)</span>
                <button onclick="clearLogs()" class="text-zinc-600 hover:text-white transition-colors">TEMİZLE</button>
            </div>
            <div id="terminal-box" class="h-28 overflow-y-auto space-y-1 pr-1 flex flex-col-reverse">
                <!-- Günlükler buraya akacak -->
            </div>
        </div>

    </main>

    <!-- Alt Bilgi -->
    <footer class="py-4 border-t border-zinc-950 bg-black/60 text-center text-[9px] text-zinc-600 uppercase tracking-widest">
        <p>© 2026 H-AI CORE BACKGROUND SERVICES</p>
    </footer>

    <script>
        let recognition = null;
        let isServiceRunning = false;
        let wakeWord = "hey susam";
        let audioCtx = null;
        let silentBufferSource = null;

        const voiceCore = document.getElementById('voice-core');
        const micIcon = document.getElementById('mic-icon');
        const coreStateText = document.getElementById('core-state-text');
        const serviceBadge = document.getElementById('service-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const wakeInput = document.getElementById('wake-word-input');
        const ctrlBtn = document.getElementById('ctrl-btn');
        const terminalBox = document.getElementById('terminal-box');
        const wakelockToggle = document.getElementById('wakelock-toggle');
        const ripple1 = document.getElementById('ripple-1');
        const ripple2 = document.getElementById('ripple-2');

        // Terminale Log Yazma Fonksiyonu
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            let color = 'text-zinc-500';
            if (type === 'success') color = 'text-green-400 font-bold';
            if (type === 'warn') color = 'text-yellow-500';
            if (type === 'error') color = 'text-red-500 font-bold';
            if (type === 'active') color = 'text-blue-400';

            const logElement = document.createElement('div');
            logElement.className = `${color} leading-relaxed break-all`;
            logElement.innerHTML = `[${time}] ${message}`;
            terminalBox.insertBefore(logElement, terminalBox.firstChild);
        }

        window.clearLogs = function() {
            terminalBox.innerHTML = '';
            log("Konsol temizlendi.");
        };

        // Sessiz Güç Kilidi (Android Arka Plan Tutucu)
        function startSilentAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // İnsan kulağının duyamayacağı (örneğin 20000 Hz üstü veya sıfır genlik) bir sessiz sinyal üretir
                const bufferSize = audioCtx.sampleRate;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                
                // Buffer'ın içini sıfırlarla dolduruyoruz (Tamamen Sessiz)
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = 0;
                }

                silentBufferSource = audioCtx.createBufferSource();
                silentBufferSource.buffer = buffer;
                silentBufferSource.loop = true;
                silentBufferSource.connect(audioCtx.destination);
                silentBufferSource.start();
                
                log("Sessiz Güç Kilidi (Audio WakeLock) aktifleşti.", "active");
            } catch (err) {
                log("Güç Kilidi başlatılamadı: " + err.message, "warn");
            }
        }

        function stopSilentAudio() {
            if (silentBufferSource) {
                try {
                    silentBufferSource.stop();
                    log("Sessiz Güç Kilidi devredışı bırakıldı.");
                } catch (e) {}
                silentBufferSource = null;
            }
        }

        // Web Speech API - Sürekli Dinleme Motoru
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                log("Cihazınız Web Speech API desteklemiyor!", "error");
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'tr-TR';

            recognition.onstart = () => {
                log("Mikrofon dinlemeye başladı. Kelime bekleniyor...", "info");
                setUIState('listening');
            };

            recognition.onerror = (event) => {
                // Arka planda çalışırken oluşan sessizlik hatalarını yoksay ve logla
                if (event.error !== 'no-speech') {
                    log("Algılama hatası: " + event.error, "warn");
                }
            };

            recognition.onend = () => {
                // Servis hala aktifse, kapandığı an otomatik olarak GERİ AÇ (Arka plan sürekliliği)
                if (isServiceRunning) {
                    setTimeout(() => {
                        try {
                            recognition.start();
                            log("Ses motoru otomatik olarak yeniden başlatıldı.");
                        } catch (e) {}
                    }, 200);
                } else {
                    log("Ses motoru durduruldu.");
                    setUIState('idle');
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const currentText = (finalTranscript || interimTranscript).toLowerCase().trim();
                if (currentText) {
                    log(`Duyulan: "${currentText}"`);
                    
                    // Anahtar kelime yakalama kontrolü (Fuzzy matching ile esnek arama)
                    if (currentText.includes(wakeWord.toLowerCase().trim())) {
                        triggerWakeUp(currentText);
                    }
                }
            };

            return true;
        }

        // Kelime Algılandığında Tetikleyici Çalıştır
        function triggerWakeUp(heardPhrase) {
            log(`SİHİRLİ KELİME YAKALANDI! -> "${heardPhrase}"`, "success");
            setUIState('success');

            // App Inventor CustomWebView Entegrasyonu (Uygulamayı Ön Plana Getirmek veya Ses Çalmak için)
            if (window.AppInventor && window.AppInventor.setWebViewString) {
                window.AppInventor.setWebViewString("hey_susam");
            } else {
                log("App Inventor köprüsü bulunamadı (Tarayıcıda test ediliyor).", "warn");
            }

            // 1.5 saniye sonra tekrar standart dinleme durumuna geri dön
            setTimeout(() => {
                if (isServiceRunning) {
                    setUIState('listening');
                }
            }, 1500);
        }

        // Arayüz Durum Yönetimi
        function setUIState(state) {
            if (state === 'idle') {
                voiceCore.className = "w-40 h-40 rounded-full border-2 border-zinc-800 bg-black/40 flex items-center justify-center transition-all duration-500 relative cursor-pointer";
                micIcon.className = "fa-solid fa-microphone text-3xl text-zinc-700";
                coreStateText.innerText = "DOKUN VE BAŞLAT";
                coreStateText.className = "text-[9px] text-zinc-500 uppercase tracking-widest mt-2 font-mono";
                serviceBadge.className = "text-[9px] bg-zinc-900 text-zinc-400 px-2.5 py-1 rounded font-mono border border-zinc-800/60 uppercase tracking-widest flex items-center gap-1.5";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse";
                statusText.innerText = "ÇEVRİMDIŞI";
                ctrlBtn.className = "w-full bg-white hover:bg-zinc-200 text-black font-bold text-sm py-3.5 rounded-lg transition-all flex items-center justify-center gap-2";
                ctrlBtn.innerHTML = `<i class="fa-solid fa-power-off"></i> Servisi Aktifleştir`;
                ripple1.classList.add('hidden');
                ripple2.classList.add('hidden');
            } 
            else if (state === 'listening') {
                voiceCore.className = "w-40 h-40 rounded-full border-2 bg-black/40 flex items-center justify-center transition-all duration-500 relative cursor-pointer glow-listening";
                micIcon.className = "fa-solid fa-microphone text-3xl text-blue-400";
                coreStateText.innerText = "SESSİZCE DİNLİYOR";
                coreStateText.className = "text-[9px] text-blue-400 uppercase tracking-widest mt-2 font-mono";
                serviceBadge.className = "text-[9px] bg-blue-950 text-blue-400 px-2.5 py-1 rounded font-mono border border-blue-900/60 uppercase tracking-widest flex items-center gap-1.5";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-blue-500 animate-ping";
                statusText.innerText = "DİNLİYOR";
                ctrlBtn.className = "w-full bg-red-950 hover:bg-red-900 text-red-200 border border-red-900 font-bold text-sm py-3.5 rounded-lg transition-all flex items-center justify-center gap-2";
                ctrlBtn.innerHTML = `<i class="fa-solid fa-circle-stop"></i> Servisi Durdur`;
                ripple1.classList.remove('hidden');
                ripple2.classList.remove('hidden');
            } 
            else if (state === 'success') {
                voiceCore.className = "w-40 h-40 rounded-full border-2 bg-black/40 flex items-center justify-center transition-all duration-500 relative cursor-pointer glow-success";
                micIcon.className = "fa-solid fa-check text-3xl text-green-400";
                coreStateText.innerText = "SÖZCÜK ALGILANDI";
                coreStateText.className = "text-[9px] text-green-400 uppercase tracking-widest mt-2 font-mono";
            }
        }

        // Servis Kilidini Açma / Kapatma (Ana Tetikleyici)
        function toggleService() {
            if (!isServiceRunning) {
                // Başlatılıyor
                wakeWord = wakeInput.value.trim() || "hey susam";
                log(`H-AI Servisi başlatılıyor. Hedef sözcük: "${wakeWord}"`, "active");

                if (wakelockToggle.checked) {
                    startSilentAudio();
                }

                if (!recognition) {
                    initSpeechRecognition();
                }

                try {
                    recognition.start();
                    isServiceRunning = true;
                    log("Servis başarıyla kilitlendi ve arka plana hazır hale getirildi.", "success");
                } catch (e) {
                    log("Hata: " + e.message, "error");
                }
            } else {
                // Durduruluyor
                log("Servis kapatılıyor...", "warn");
                isServiceRunning = false;
                stopSilentAudio();
                if (recognition) {
                    recognition.stop();
                }
                setUIState('idle');
            }
        }

        ctrlBtn.addEventListener('click', toggleService);
        voiceCore.addEventListener('click', toggleService);

        // Sayfa ilk yüklendiğinde
        window.addEventListener('DOMContentLoaded', () => {
            log("H-AI Arka Plan Portalı Hazır. Başlatmak için butona basın.");
        });
    </script>
</body>
</html>
