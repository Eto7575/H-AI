<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCAPTCHA</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }
    .uyari-metni {
      max-width: 350px;
      text-align: center;
      font-size: 14px;
      color: #333;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Orijinal reCAPTCHA Pencere Tasarımı */
    #gicik-recaptcha-pencere {
      display: none;
      width: 310px;
      background-color: #fff;
      border: 1px solid #ccc;
      box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14);
      padding: 7px;
      box-sizing: border-box;
    }
    .rc-mavi-baslik {
      background-color: #1a73e8;
      color: #fff;
      padding: 16px 16px 24px 16px;
      font-weight: 400;
      line-height: 1.3;
    }
    .rc-baslik-ana {
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Resimdeki Gibi Dikey ve Uzun Liste Alanı */
    .rc-liste-icerik {
      padding: 5px 0;
      max-height: 320px;
      overflow-y: auto; /* Çok uzun liste pencere içinde kaydırılabilsin */
      border: 1px solid #dfdfdf;
      margin: 4px 0;
    }
    
    /* Resimdeki Her Bir Onay Satırının Tasarımı */
    .onay-satiri {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 8px;
      border-bottom: 1px solid #f0f0f0;
      background-color: #ffffff;
      cursor: pointer;
      user-select: none;
    }
    .onay-satiri:hover {
      background-color: #fafafa;
    }
    .sol-kisin {
      display: flex;
      align-items: center;
    }
    /* Özelleştirilmiş Büyük Onay Kutusu */
    .onay-satiri input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #1a73e8; /* Seçildiğinde reCAPTCHA mavisi olur */
    }
    .onay-metin-alani {
      font-size: 12px;
      color: #222;
      font-weight: 500;
    }
    /* Sağdaki Küçük reCAPTCHA Döner Amblemi */
    .sag-logo-alani {
      width: 22px;
      height: 22px;
      background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat center;
      background-size: contain;
      opacity: 0.4;
    }

    .rc-alt-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px 5px 5px;
      border-top: 1px solid #ccc;
      background: white;
    }
    .rc-ikonlar {
      display: flex;
      gap: 15px;
      opacity: 0.5;
    }
    .rc-ikon {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #verify-butonu {
      background-color: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #verify-butonu:hover {
      background-color: #1557b0;
    }
  </style>
</head>
<body>

  <div class="uyari-metni" id="baslik-metni">
    Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.
  </div>
  <div id="recaptcha-container"></div>

  <div id="gicik-recaptcha-pencere">
    <div class="rc-mavi-baslik">
      <div class="rc-baslik-ana">Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.</div>
    </div>
    
    <div class="rc-liste-icerik">
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir robot değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir yapay zeka sistemi değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir kaba kuvvet yazılımı değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir cihaz çiftliği değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir otomatik tıklama botu değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben kötü amaçlı bir hacker değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir çamaşır makinesi değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben akıllı bir buzdolabı değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Ben bir web kazıyıcı değilim.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
      <label class="onay-satiri">
        <div class="sol-kisin"><input type="checkbox" class="gogogicik"><span class="onay-metin-alani">Kesinlikle gerçek bir insanım.</span></div>
        <div class="sag-logo-alani"></div>
      </label>
    </div>

    <div class="rc-alt-bar">
      <div class="rc-ikonlar">
        <span class="rc-ikon">🔄</span>
        <span class="rc-ikon">🎧</span>
        <span class="rc-ikon">ℹ️</span>
      </div>
      <button id="verify-butonu" onclick="listeyiKontrolEt()">Verify</button>
    </div>
  </div>

  <script>
    // Gerçek Firebase Bilgilerin
    var firebaseConfig = {
      apiKey: "AIzaSyC_UbnaLpQv8Lnq65QQL9ARRZEPRZqW2d8",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.firebasestorage.app",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:web:3106ad119ae72e377b2df6",
      measurementId: "G-YKTLBVH5CW"
    };
    
    firebase.initializeApp(firebaseConfig);

    // 1. Aşama: Gerçek reCAPTCHA v2 Başlatma
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
      }
    });
    window.recaptchaVerifier.render();

    // 2. Aşama: Liste Kontrolü ve Senin Hata Mesajın
    function listeyiKontrolEt() {
      var kutular = document.querySelectorAll('.gogogicik');
      var hepsiSecili = true;
      
      kutular.forEach(function(kutu) {
        if (!kutu.checked) {
          hepsiSecili = false;
        }
      });

      if (hepsiSecili) {
        document.getElementById("gicik-recaptcha-pencere").style.display = "none";
        window.AppInventor.setWebViewString("RobotDegil");
      } else {
        alert("Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulamak başarısız oldu. Tüm kutucukları işaretleyin ve tekrar deneyin.");
      }
    }

    function startGoogleSignIn() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          
          if (phoneNumber) {
            window.AppInventor.setWebViewString("Telefon:" + phoneNumber);
          } else {
            window.AppInventor.setWebViewString("NumaraYok:" + user.displayName);
          }
        }).catch(function(error) {
          window.AppInventor.setWebViewString("Hata: " + error.message);
        });
    }
  </script>
</body>
</html>
