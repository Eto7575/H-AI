<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCAPTCHA</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }
    .uyari-metni {
      max-width: 350px;
      text-align: center;
      font-size: 14px;
      color: #333;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Tam reCAPTCHA Pencere Matrisi Tasarımı */
    #gicik-recaptcha-pencere {
      display: none;
      width: 310px;
      background-color: #fff;
      border: 1px solid #ccc;
      box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14);
      padding: 7px;
      box-sizing: border-box;
    }
    .rc-mavi-baslik {
      background-color: #1a73e8;
      color: #fff;
      padding: 16px 16px 24px 16px;
      font-weight: 400;
      line-height: 1.3;
    }
    .rc-baslik-ana {
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Yan yana 3'lü reCAPTCHA Grid Yapısı */
    .rc-grid-icerik {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px 0;
      background-color: #ccc; /* Karelerin arasındaki ince çizgiler için */
      border: 4px solid #fff;
    }
    
    /* Her bir reCAPTCHA seçeneği (Kareler) */
    .onay-kare-kutusu {
      position: relative;
      background-color: #f9f9f9;
      aspect-ratio: 1 / 1; /* Tam kare olmasını sağlar */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      box-sizing: border-box;
      text-align: center;
      font-size: 10px;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease;
    }
    
    /* Gizli görünmez input */
    .onay-kare-kutusu input {
      display: none;
    }

    /* Bir kare seçildiğinde (reCAPTCHA stili mavi daralma efekti) */
    .onay-kare-kutusu.secildi {
      transform: scale(0.92);
      outline: 2px solid #1a73e8;
      z-index: 2;
      background-color: #fff;
    }

    /* Mavi Tik İşareti */
    .onay-kare-kutusu.secildi::before {
      content: "✓";
      position: absolute;
      top: 2px;
      left: 2px;
      background-color: #1a73e8;
      color: white;
      width: 14px;
      height: 14px;
      font-size: 10px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rc-alt-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px 5px 5px;
      border-top: 1px solid #ccc;
      background: white;
    }
    .rc-ikonlar {
      display: flex;
      gap: 15px;
      opacity: 0.5;
    }
    .rc-ikon {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #verify-butonu {
      background-color: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #verify-butonu:hover {
      background-color: #1557b0;
    }
  </style>
</head>
<body>

  <div class="uyari-metni" id="baslik-metni">
    Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.
  </div>
  <div id="recaptcha-container"></div>

  <div id="gicik-recaptcha-pencere">
    <div class="rc-mavi-baslik">
      <div class="rc-baslik-ana">Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.</div>
    </div>
    
    <div class="rc-grid-icerik">
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Robot Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>AI Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Yazılım Değilim</span></label>
      
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Cihaz Çiftliği Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Bot Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Hacker Değilim</span></label>
      
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Çamaşır Makinesi Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Buzdolabı Değilim</span></label>
      <label class="onay-kare-kutusu"><input type="checkbox" class="gogogicik"><span>Scraper Değilim</span></label>
    </div>

    <div class="rc-alt-bar">
      <div class="rc-ikonlar">
        <span class="rc-ikon">🔄</span>
        <span class="rc-ikon">🎧</span>
        <span class="rc-ikon">ℹ️</span>
      </div>
      <button id="verify-butonu" onclick="listeyiKontrolEt()">Verify</button>
    </div>
  </div>

  <script>
    // Gerçek Firebase Bilgilerin
    var firebaseConfig = {
      apiKey: "AIzaSyC_UbnaLpQv8Lnq65QQL9ARRZEPRZqW2d8",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.firebasestorage.app",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:web:3106ad119ae72e377b2df6",
      measurementId: "G-YKTLBVH5CW"
    };
    
    firebase.initializeApp(firebaseConfig);

    // Karelere tıklanınca reCAPTCHA seçim animasyonunu çalıştırma
    document.querySelectorAll('.onay-kare-kutusu').forEach(function(kare) {
      kare.addEventListener('click', function() {
        var chk = this.querySelector('input');
        // Tıklama durumuna göre class ekle/çıkar
        if(chk.checked) {
          this.classList.add('secildi');
        } else {
          this.classList.remove('secildi');
        }
      });
    });

    // 1. Aşama: Gerçek reCAPTCHA v2 Başlatma
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptence-pencere" ? "gicik-recaptcha-pencere" : "gicik-recaptcha-pencere").style.display = "block";
      }
    });
    window.recaptchaVerifier.render();

    // 2. Aşama: Liste Kontrolü ve Senin Hata Mesajın
    function listeyiKontrolEt() {
      var kutular = document.querySelectorAll('.gogogicik');
      var hepsiSecili = true;
      
      kutular.forEach(function(kutu) {
        if (!kutu.checked) {
          hepsiSecili = false;
        }
      });

      if (hepsiSecili) {
        document.getElementById("gicik-recaptcha-pencere").style.display = "none";
        window.AppInventor.setWebViewString("RobotDegil");
      } else {
        alert("Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulamak başarısız oldu. Tüm kutucukları işaretleyin ve tekrar deneyin.");
      }
    }

    function startGoogleSignIn() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          
          if (phoneNumber) {
            window.AppInventor.setWebViewString("Telefon:" + phoneNumber);
          } else {
            window.AppInventor.setWebViewString("NumaraYok:" + user.displayName);
          }
        }).catch(function(error) {
          window.AppInventor.setWebViewString("Hata: " + error.message);
        });
    }
  </script>
</body>
</html>
