<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Messenger Uzun Liste & Çifte Captcha</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { margin-bottom: 20px; color: #333; text-align: center; font-size: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .input-group input:focus { border-color: #007bff; outline: none; }
        
        /* Bizim Kelime Sözlüğü Captcha Alanı */
        .sozluk-captcha-box { background: #e9ecef; border: 2px dashed #6c757d; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: center; display: none; }
        .captcha-text { font-size: 18px; font-weight: bold; color: #d9534f; letter-spacing: 1px; margin-bottom: 10px; user-select: none; }
        
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .error-msg { color: #d9534f; font-size: 13px; margin-top: 5px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Uzun Liste Veri Girişi</h2>
    <form id="mainForm" onsubmit="formuIsle(event)">
        
        <div class="input-group">
            <label>Listenin 1. Elemanı</label>
            <input type="text" id="veri1" required placeholder="Veri girin...">
        </div>
        
        <div class="input-group">
            <label>Listenin 2. Elemanı</label>
            <input type="text" id="veri2" required placeholder="Veri girin...">
        </div>

        <div class="input-group">
            <label>Listenin 3. Elemanı</label>
            <input type="text" id="veri3" required placeholder="Veri girin...">
        </div>

        <div class="g-recaptcha"
             data-sitekey="SENIN_GOOGLE_SITE_KEYIN"
             data-callback="googleRecaptchaBasarili"
             data-size="invisible">
        </div>

        <div class="sozluk-captcha-box" id="sozlukContainer">
            <p style="font-size: 13px; color: #666; margin-bottom: 5px;">Aşağıdaki kelime grubunu doğrulama kutusuna yazın:</p>
            <div class="captcha-text" id="generatedCaptcha"></div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="text" id="captchaInput" placeholder="Sıfat + Zamir + Fiil sırasıyla">
                <div class="error-msg" id="errorField">Kelimeler sözlük doğrulamasıyla eşleşmedi!</div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Listeyi Gönder ve Doğrula</button>
    </form>
</div>

<script>
    // Bizim Dil Bilgisi Sözlüğümüz
    const sozluk = {
        sifatlar: ["Hızlı", "Mavi", "Yorgun", "Gizli", "Zeki", "Büyük", "Sessiz", "Sıcak"],
        zamirler: ["Ben", "Sen", "O", "Biz", "Siz", "Onlar", "Kendisi", "Herkes"],
        fiiller: ["Koştu", "Yazdı", "Gördü", "Güldü", "Bildi", "Geldi", "Baktı", "Çözdü"]
    };

    let uretilenCaptcha = "";
    let googleOnayli = false;
    let googleToken = "";

    // Rastgele Sıfat + Zamir + Fiil kombinasyonu oluşturan fonksiyon
    function captchaUret() {
        const randomSifat = sozluk.sifatlar[Math.floor(Math.random() * sozluk.sifatlar.length)];
        const randomZamir = sozluk.zamirler[Math.floor(Math.random() * sozluk.zamirler.length)];
        const randomFiil = sozluk.fiiller[Math.floor(Math.random() * sozluk.fiiller.length)];
        return `${randomSifat} ${randomZamir} ${randomFiil}`;
    }

    // Kullanıcı listeyi doldurup butona bastığında ilk burası çalışır
    function formuIsle(event) {
        event.preventDefault(); 

        // Adım 1: Google henüz onaylamadıysa arka planda görünmez reCAPTCHA'yı çalıştır
        if (!googleOnayli) {
            grecaptcha.execute();
            return;
        }

        // Adım 3: Google tamsa, bizim kelime captcha kontrolünü yap
        const errorField = document.getElementById("errorField");
        const userInput = document.getElementById("captchaInput").value.trim();

        if (userInput.toLowerCase() === uretilenCaptcha.toLowerCase()) {
            errorField.style.display = "none";
            
            // Sadece uzun listenin verilerini ve tokenları topluyoruz
            const dataPaketi = {
                status: "SUCCESS",
                recaptchaToken: googleToken,
                listeVerisi1: document.getElementById("veri1").value,
                listeVerisi2: document.getElementById("veri2").value,
                listeVerisi3: document.getElementById("veri3").value,
                sozlukCaptcha: uretilenCaptcha
            };

            // WebView üzerinden uygulamaya veri paketi fırlatılıyor
            if (window.AndroidInterface) {
                window.AndroidInterface.postMessage(JSON.stringify(dataPaketi));
            } else {
                alert("Doğrulama Başarılı!\n" + JSON.stringify(dataPaketi));
            }
        } else {
            errorField.style.display = "block";
            document.getElementById("captchaInput").value = "";
            uretilenCaptcha = captchaUret();
            document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        }
    }

    // Adım 2: Google reCAPTCHA v2 Invisible onay verince çalışan fonksiyon
    function googleRecaptchaBasarili(token) {
        googleOnayli = true;
        googleToken = token; 

        // Google geçilince bizim kelime listesini kutunun hemen altında gösteriyoruz
        uretilenCaptcha = captchaUret();
        document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        document.getElementById("sozlukContainer").style.display = "block";
        
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.innerText = "Kelimeleri Doğrula";
        submitBtn.style.backgroundColor = "#28a745"; 
    }
</script>

</body>
</html>
