<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Messenger Gelişmiş Captcha Sistemi</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { margin-bottom: 20px; color: #333; text-align: center; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; transition: 0.3s; }
        .input-group input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        
        /* Bizim Kelime Sözlüğü Captcha Alanı */
        .sozluk-captcha-box { background: #e9ecef; border: 2px dashed #6c757d; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: center; display: none; }
        .captcha-text { font-size: 18px; font-weight: bold; color: #d9534f; letter-spacing: 1px; margin-bottom: 10px; user-select: none; }
        
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #0056b3; }
        .error-msg { color: #d9534f; font-size: 13px; margin-top: 5px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kayıt Formu & Çifte Captcha</h2>
    <form id="mainForm" onsubmit="formuIsle(event)">
        
        <div class="input-group">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" id="username" required placeholder="Örn: kayaertugrul">
        </div>
        
        <div class="input-group">
            <label for="email">E-posta Adresi</label>
            <input type="email" id="email" required placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label for="status">Durum Mesajı</label>
            <input type="text" id="status" required placeholder="H-Messenger Durumu">
        </div>

        <div class="g-recaptcha"
             data-sitekey="SENIN_GOOGLE_SITE_KEYIN"
             data-callback="googleRecaptchaBasarili"
             data-size="invisible">
        </div>

        <div class="sozluk-captcha-box" id="sozlukContainer">
            <p style="font-size: 13px; color: #666; margin-bottom: 5px;">Google onayı başarılı! Son adım olarak aşağıdaki kelimeleri yazın:</p>
            <div class="captcha-text" id="generatedCaptcha"></div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="text" id="captchaInput" placeholder="Sıfat + Zamir + Fiil sırasıyla">
                <div class="error-msg" id="errorField">Girdiğiniz kelimeler sözlük doğrulamasıyla eşleşmedi!</div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Devam Et</button>
    </form>
</div>

<script>
    // Bizim Dil Bilgisi Sözlüğümüz
    const sozluk = {
        sifatlar: ["Hızlı", "Mavi", "Yorgun", "Gizli", "Zeki", "Büyük", "Sessiz", "Sıcak"],
        zamirler: ["Ben", "Sen", "O", "Biz", "Siz", "Onlar", "Kendisi", "Herkes"],
        fiiller: ["Koştu", "Yazdı", "Gördü", "Güldü", "Bildi", "Geldi", "Baktı", "Çözdü"]
    };

    let uretilenCaptcha = "";
    let googleOnayli = false;
    let googleToken = "";

    // Rastgele Sıfat + Zamir + Fiil kombinasyonu oluşturan fonksiyon
    function captchaUret() {
        const randomSifat = sozluk.sifatlar[Math.floor(Math.random() * sozluk.sifatlar.length)];
        const randomZamir = sozluk.zamirler[Math.floor(Math.random() * sozluk.zamirler.length)];
        const randomFiil = sozluk.fiiller[Math.floor(Math.random() * sozluk.fiiller.length)];
        return `${randomSifat} ${randomZamir} ${randomFiil}`;
    }

    // 1. ADIM: Kullanıcı butona bastığında çalışan ilk fonksiyon
    function formuIsle(event) {
        event.preventDefault(); // Sayfanın yenilenmesini durdur

        // Eğer Google henüz arka planda onay vermediyse, önce görünmez reCAPTCHA'yı tetikle
        if (!googleOnayli) {
            grecaptcha.execute();
            return;
        }

        // 3. ADIM: Google onayından sonra, bizim kelime captcha kontrolü yapılır
        const errorField = document.getElementById("errorField");
        const userInput = document.getElementById("captchaInput").value.trim();

        if (userInput.toLowerCase() === uretilenCaptcha.toLowerCase()) {
            errorField.style.display = "none";
            
            // Tüm verileri (Form verileri + Google Tokenı + Çözülen Sözlük Captcha) tek pakette topluyoruz
            const dataPaketi = {
                status: "SUCCESS",
                recaptchaToken: googleToken,
                username: document.getElementById("username").value,
                email: document.getElementById("email").value,
                userStatus: document.getElementById("status").value,
                sozlukCaptcha: uretilenCaptcha
            };

            // Eğer uygulamaya / WebView köprüsüne veri paslayacaksan:
            if (window.AndroidInterface) {
                window.AndroidInterface.postMessage(JSON.stringify(dataPaketi));
            } else {
                alert("Tebrikler! Çifte doğrulama başarılı.\nVeriler: " + JSON.stringify(dataPaketi));
            }
        } else {
            // Sözlük yanlış yazılırsa hata ver ve kelimeleri yenile
            errorField.style.display = "block";
            document.getElementById("captchaInput").value = "";
            uretilenCaptcha = captchaUret();
            document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        }
    }

    // 2. ADIM: Google reCAPTCHA v2 Invisible arka planda onay verince otomatik çalışan fonksiyon
    function googleRecaptchaBasarili(token) {
        googleOnayli = true;
        googleToken = token; // Google'dan gelen güvenlik tokenı

        // Google geçildikten sonra bizim Sıfat+Zamir+Fiil alanını görünür yapıyoruz
        uretilenCaptcha = captchaUret();
        document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        
        document.getElementById("sozlukContainer").style.display = "block";
        
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.innerText = "Sözlüğü Doğrula ve Gönder";
        submitBtn.style.backgroundColor = "#28a745"; // Butonu yeşile çevir
    }
</script>

</body>
</html>
