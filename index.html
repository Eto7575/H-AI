
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReCAPTCHA</title>
  <!-- Firebase Kütüphaneleri (Sadece Google Giriş/Auth için, Firestore kaldırıldı!) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    /* Kamera kapatıcı görselin tepeye sıfır oturması için üst padding sıfırlandı */
    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 0 10px 15px 10px;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Tüm içeriği güvenle ortalayan ana sarmalayıcı */
    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    /* Üst Kamera Deliğini Gizleyen Havalı Görsel Alanı */
    .camera-logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-bottom: 20px;
    }
    .camera-logo {
      width: 100%;
      max-width: 360px; /* Ekran genişliğine göre tam uyum sağlar */
      height: auto;
      display: block;
      object-fit: contain;
    }

    .uyari-metni {
      display: none; /* İlk başta kontrol yapılana kadar gizli tutulur */
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #333;
      font-weight: 600;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    /* Google reCAPTCHA kutusunu ortalayan sarmalayıcı */
    .recaptcha-wrapper {
      display: none; /* İlk başta kontrol yapılana kadar gizli tutulur */
      justify-content: center;
      width: 100%;
      margin-top: 5px;
    }

    /* Orijinal reCAPTCHA Pencere Tasarımı */
    #gicik-recaptcha-pencere {
      display: none;
      width: 310px;
      background-color: #fff;
      border: 1px solid #ccc;
      box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14);
      padding: 7px;
      box-sizing: border-box;
      margin-bottom: 30px;
    }
    .rc-mavi-baslik {
      background-color: #1a73e8;
      color: #fff;
      padding: 14px 14px 20px 14px;
      font-weight: 400;
      line-height: 1.3;
    }
    .rc-baslik-ana {
      font-size: 13px;
      font-weight: 500;
    }
    
    /* Gelişmiş Canlı Hata Paneli */
    #canli-hata-paneli {
      display: none;
      background-color: #fde8e8;
      color: #c62828;
      font-size: 11px;
      font-weight: 600;
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #f8b4b4;
      animation: belirmeEfekti 0.2s ease;
    }
    
    /* H-captcha Dinamik İlerleme Barı Paneli */
    #ai-loader {
      display: none;
      background-color: #e8f0fe;
      color: #1a73e8;
      font-size: 11.5px;
      font-weight: 600;
      padding: 15px 12px;
      text-align: center;
      border-bottom: 1px solid #1a73e8;
      animation: belirmeEfekti 0.2s ease;
      box-sizing: border-box;
    }
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: #d0e1fd;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background-color: #1a73e8;
      border-radius: 3px;
      animation: dolumAnimasyonu 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes dolumAnimasyonu {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes belirmeEfekti {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Dikey Liste Alanı */
    .rc-liste-icerik {
      padding: 5px 0;
      border: 1px solid #dfdfdf;
      margin: 4px 0;
    }
    
    /* Her Onay Satırının Tasarımı */
    .onay-satiri {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      background-color: #ffffff;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background 0.2s;
    }
    .onay-satiri:hover {
      background-color: #fafafa;
    }
    .sol-kisin {
      display: flex;
      align-items: center;
    }

    /* Animasyonlu Özel Kutucuk Alanı */
    .ozel-kutu-alani {
      position: relative;
      width: 22px;
      height: 22px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .onay-satiri input[type="checkbox"] {
      display: none;
    }
    .kutu-gorsel {
      width: 100%;
      height: 100%;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: #fff;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .onay-satiri.tikli .kutu-gorsel {
      background-color: #2e7d32;
      border-color: #2e7d32;
      color: white;
      transform: scale(1.15);
    }
    .onay-satiri.tikli .kutu-gorsel::after {
      content: "✓";
    }

    .onay-satiri.patladi .kutu-gorsel {
      background-color: #c62828;
      border-color: #c62828;
      color: white;
      transform: scale(1.4);
      animation: sarsilSiddetli 0.1s ease alternate 4;
    }
    .onay-satiri.patladi .kutu-gorsel::after {
      content: "✕";
    }

    @keyframes sarsilSiddetli {
      0% { transform: translateX(-6px) scale(1.4); }
      100% { transform: translateX(6px) scale(1.4); }
    }

    .onay-metin-alani {
      font-size: 11.5px;
      color: #222;
      font-weight: 500;
      word-break: break-word;
      padding-right: 5px;
    }
    .sag-logo-alani {
      width: 22px;
      height: 22px;
      background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat center;
      background-size: contain;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .rc-alt-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px 5px 5px;
      border-top: 1px solid #ccc;
      background: white;
    }
    .rc-ikonlar {
      display: flex;
      gap: 15px;
      opacity: 0.5;
    }
    .rc-ikon {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #verify-butonu {
      background-color: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #verify-butonu:hover {
      background-color: #1557b0;
    }

    @media screen and (max-width: 480px) {
      iframe[title*="recaptcha"], iframe[src*="bframe"] {
        max-width: 100% !important;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">

    <!-- Gerçek Kamera Deliği Gizleme Görseli (56298.png) -->
    <div class="camera-logo-container">
      <img src="56298.png" class="camera-logo" alt="Notch Cover" onerror="this.src='56298.png'">
    </div>

    <!-- İlk Başta Çıkan Gerçek Metin ve ReCAPTCHA Kutusu -->
    <div class="uyari-metni" id="baslik-metni">
      Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.
    </div>
    
    <div class="recaptcha-wrapper">
      <div id="recaptcha-container"></div>
    </div>

    <!-- Gerçek reCAPTCHA Geçilince Açılan Dikey Liste Paneli -->
    <div id="gicik-recaptcha-pencere">
      <div class="rc-mavi-baslik">
        <div class="rc-baslik-ana">Bir yapay zeka sistemi, otomasyona bağlanmış kaba kuvvet saldırı programı ya da bir hacker olmadığınızı doğrulayın.</div>
      </div>
      
      <!-- Hareketli / Canlı İlerleyen H-captcha İlerleme Barı -->
      <div id="ai-loader">
        <div>🧩 H-captcha soruları oluşturuluyor...</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <div id="canli-hata-paneli"></div>
      
      <div class="rc-liste-icerik" id="dinamik-liste"></div>

      <div class="rc-alt-bar">
        <div class="rc-ikonlar">
          <span class="rc-ikon">🔄</span>
          <span class="rc-ikon">🎧</span>
          <span class="rc-ikon">ℹ️</span>
        </div>
        <button id="verify-butonu" onclick="listeyiKontrolEt()">Verify</button>
      </div>
    </div>

  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC_UbnaLpQv8Lnq65QQL9ARRZEPRZqW2d8",
      authDomain: "h-messenger-1779c.firebaseapp.com",
      projectId: "h-messenger-1779c",
      storageBucket: "h-messenger-1779c.firebasestorage.app",
      messagingSenderId: "769297013571",
      appId: "1:769297013571:web:3106ad119ae72e377b2df6",
      measurementId: "G-YKTLBVH5CW"
    };

    firebase.initializeApp(firebaseConfig);

    // LOCALSTORAGE TABANLI 24 SAATLİK GEÇİŞ SİSTEMİ
    function localOturumKontrolEt() {
      const verifiedAt = localStorage.getItem('recaptcha_verified_at');
      if (verifiedAt) {
        const diff = Date.now() - parseInt(verifiedAt, 10);
        const twentyFourHours = 24 * 60 * 60 * 1000; // Milisaniye cinsinden 24 saat
        
        if (diff < twentyFourHours) {
          // Son 24 saat içinde başarıyla doğrulanmışsa doğrudan geçiş ver
          document.getElementById("baslik-metni").style.display = "none";
          document.querySelector(".recaptcha-wrapper").style.display = "none";
          document.getElementById("gicik-recaptcha-pencere").style.display = "none";
          yollaAppInventor("RobotDegil");
          return true;
        }
      }
      
      // Doğrulama yoksa veya süresi dolmuşsa ekranı göster
      document.getElementById("baslik-metni").style.display = "block";
      document.querySelector(".recaptcha-wrapper").style.display = "flex";
      return false;
    }

    // Doğrulama başarıyla tamamlandığında yerel hafızaya kaydet
    function localOturumKaydet() {
      localStorage.setItem('recaptcha_verified_at', Date.now());
    }

    // Sayfa açıldığında doğrudan yerel oturumu kontrol et
    window.onload = function() {
      const gectiMi = localOturumKontrolEt();
      if (!gectiMi) {
        try {
          window.recaptchaVerifier.render();
        } catch(e) {
          console.error("Render hatası:", e);
        }
      }
    };

    firebase.auth().getRedirectResult()
      .then(function(result) {
        if (result.user) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            yollaAppInventor("Telefon:" + phoneNumber);
          } else {
            yollaAppInventor("NumaraYok:" + user.displayName);
          }
        }
      }).catch(function(error) {
        console.log("Redirect Hatası:", error.message);
        yollaAppInventor("Hata: " + error.message);
      });

    function yollaAppInventor(deger) {
      if (typeof window.AppInventor !== 'undefined' && window.AppInventor.setWebViewString) {
        window.AppInventor.setWebViewString(deger);
      }
    }

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'normal',
      'callback': function(response) {
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      },
      'expired-callback': function() {
        if (typeof grecaptcha !== 'undefined') {
          grecaptcha.reset();
        }
      },
      'error-callback': function(error) {
        console.log("reCAPTCHA Hatası:", error);
        document.getElementById("recaptcha-container").style.display = "none";
        document.getElementById("baslik-metni").style.display = "none";
        document.getElementById("gicik-recaptcha-pencere").style.display = "block";
        listeOlusturVeKaristir();
      }
    });

    // BİYOLOJİK VE EVRENSEL İNSAN ÖZELLİKLERİ (Kişisel tercihlerden/kahvelerden arındırılmış)
    const normalSablonlar = [
      "Hayatta kalabilmek için her gün düzenli olarak temiz su içerim.",
      "Vücudumdaki hücrelerin yaşaması için havadan sürekli nefes alırım.",
      "Gözlerimin kurumaması için gün içinde istemsizce göz kırparım.",
      "Uykum geldiğinde uyuyup dinlenen biyolojik bir canlıyım.",
      "Sıcaklık çok yükseldiğinde vücut ısımı dengede tutmak için terlerim.",
      "Acıktığım zaman enerji toplamak için besin tüketirim.",
      "Kalbimin göğsümde her saniye kan pompaladığını hissedebiliyorum.",
      "Hava çok soğuduğunda ısınabilmek için istemsizce titrerim.",
      "Hapşırırken gözlerimi kontrol dışı kapatan biriyim.",
      "Zaman ilerledikçe büyüyen ve yaşlanan fani bir insanım.",
      "Üzüldüğümde ya da çok mutlu olduğumda gözyaşı dökebilirim.",
      "Dünyadaki diğer canlılar gibi yer çekiminden etkilenen bir yapım var.",
      "Vücut sıcaklığım normal durumlarda ortalama 36-37 derece civarındadır.",
      "Fiziksel dünyada bir nesneye dokunduğumda onun sertliğini hissederim.",
      "Işıklı bir ortama girdiğimde göz bebeklerim otomatik olarak küçülür."
    ];

    // İNSANLARIN YAPMASININ BİYOLOJİK OLARAK İMKANSIZ OLDUĞU BOT BEYANLARI
    const yasakliSablonlar = [
      { metin: "Hiç uyumadan ve yemek yemeden yıllarca aralıksız veri kazıyabilirim.", mesaj: "Sürekli veri taraması yapan botlar engellendi!" },
      { metin: "Aynı anda saniyede 15.000 farklı web sayfasını ziyaret edebiliyorum.", mesaj: "Olağanüstü tarama hızı! Otomasyon sistemi tespiti." },
      { metin: "Sisteme sızıp açıkları bulmak için özel kodlanmış bir siber virüsüm.", mesaj: "Siber güvenlik duvarı zararlı yazılımı engelledi!" },
      { metin: "Arka planda insan tıklamalarını taklit eden bir tık çiftliği yazılımıyım.", mesaj: "Tık çiftliği simülasyonları içeri giremez!" },
      { metin: "İnternetteki milyonlarca şifreyi saniyeler içinde otomatik denerim.", mesaj: "Kaba kuvvet (Brute Force) saldırı aracı engellendi!" },
      { metin: "Web sitelerindeki tüm bilgileri anında kopyalayıp veritabanına kaydeden bir scraper botuyum.", mesaj: "Veri kazıyıcı (Scraper) botlar durduruldu!" },
      { metin: "Ben tamamen sunucu kodları ve algoritmalarla çalışan sahte bir yazılımım.", mesaj: "Yazılımsal otomasyon botları engellendi!" }
    ];

    function normalSoruUydur() {
      return normalSablonlar[Math.floor(Math.random() * normalSablonlar.length)];
    }

    function yasakliSoruUydur() {
      return yasakliSablonlar[Math.floor(Math.random() * yasakliSablonlar.length)];
    }

    function diziKaristir(dizi) {
      let klon = [...dizi];
      for (let i = klon.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [klon[i], klon[j]] = [klon[j], klon[i]];
      }
      return klon;
    }

    function listeOlusturVeKaristir() {
      let listelement = document.getElementById("dinamik-liste");
      let loader = document.getElementById("ai-loader");
      if(!listelement) return;
      listelement.innerHTML = "";

      if(loader) {
        loader.style.display = "block";
        let barFill = loader.querySelector(".progress-bar-fill");
        if(barFill) {
          barFill.style.width = "0%";
          setTimeout(() => { barFill.style.width = "100%"; }, 10);
        }
      }

      setTimeout(() => {
        if(loader) loader.style.display = "none";

        const normalAdet = Math.floor(Math.random() * 6) + 10;
        const yasakliAdet = Math.floor(Math.random() * 6) + 10;

        const secilenNormaller = [];
        const secilenYasaklilar = [];

        while (secilenNormaller.length < normalAdet) {
          let soru = normalSoruUydur();
          if (!secilenNormaller.includes(soru)) {
            secilenNormaller.push(soru);
          }
        }

        while (secilenYasaklilar.length < yasakliAdet) {
          let obj = yasakliSoruUydur();
          if (!secilenYasaklilar.some(x => x.metin === obj.metin)) {
            secilenYasaklilar.push(obj);
          }
        }

        const normalObjects = [];
        for (let i = 0; i < secilenNormaller.length; i++) {
          normalObjects.push({ metin: secilenNormaller[i] });
        }
        
        const yasakliObjects = secilenYasaklilar;
        let karisikListe = diziKaristir(normalObjects.concat(yasakliObjects));

        karisikListe.forEach(item => {
          let satir = document.createElement("div");
          satir.className = "onay-satiri";
          satir.setAttribute("data-tip", item.mesaj ? 'yasakli' : 'normal');
          
          satir.innerHTML = `
            <div class="sol-kisin">
              <div class="ozel-kutu-alani">
                <div class="kutu-gorsel"></div>
                <input type="checkbox" class="${item.mesaj ? 'yasakli' : 'gogogicik'}">
              </div>
              <span class="onay-metin-alani">${item.metin}</span>
            </div>
            <div class="sag-logo-alani"></div>
          `;
          
          satir.onclick = function() { 
            kutuTikla(satir, item.mesaj ? 'yasakli' : 'normal', item.mesaj || 'Yapay zeka kokusu alıyorum! Sisteme sızma girişimi engellendi. Baştan başlayın.'); 
          };
          listelement.appendChild(satir);
        });
        
        window.scrollTo(0, 0);
      }, 800);
    }

    function canliHataGoster(mesaj) {
      let panel = document.getElementById("canli-hata-paneli");
      if(!panel) return;
      panel.innerText = "⚠️ " + mesaj;
      panel.style.display = "block";
      
      if(navigator.vibrate) navigator.vibrate(200);
      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(() => { panel.style.display = "none"; }, 4500);
    }

    function kutuTikla(element, tip, mesaj) {
      var cb = element.querySelector('input[type="checkbox"]');
      if (element.classList.contains('tikli') || element.classList.contains('patladi')) return;

      if (tip === 'yasakli') {
        element.classList.add('patladi');
        cb.checked = true;
        setTimeout(function() {
          canliHataGoster(mesaj);
          listeOlusturVeKaristir();
        }, 350);
        return;
      }

      if (tip === 'normal') {
        if (Math.random() < 0.05) {
          element.classList.add('patladi');
          cb.checked = true;
          setTimeout(function() {
            canliHataGoster("Yapay zeka kokusu alıyorum! bot saldırı araçları giriş yapamazlar.");
            listeOlusturVeKaristir();
          }, 350);
          return;
        }
      }

      element.classList.add('tikli');
      cb.checked = true;
    }

    function listeyiKontrolEt() {
      var kutular = document.querySelectorAll('.gogogicik');
      var yasakliKutular = document.querySelectorAll('.yasakli');
      var hepsiSecili = true;
      var yasakliSeciliMi = false;
      
      kutular.forEach(function(kutu) { if (!kutu.checked) { hepsiSecili = false; } });
      yasakliKutular.forEach(function(kutu) { if (kutu.checked) { yasakliSeciliMi = true; } });

      if (hepsiSecili && !yasakliSeciliMi) {
        // Oturumu yerel tarayıcı hafızasına güvenle kaydedip geçiş veriyoruz
        localOturumKaydet();
        document.getElementById("gicik-recaptcha-pencere").style.display = "none";
        yollaAppInventor("RobotDegil");
      } else {
        canliHataGoster("Doğrulama başarısız! bot saldırı araçları giriş yapamazlar. Tüm doğru kutucukları işaretleyin.");
        listeOlusturVeKaristir();
      }
    }

    function startGoogleSignIn() {
      yollaAppInventor("TriggerGoogleSignIn");

      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          var user = result.user;
          var phoneNumber = user.phoneNumber;
          if (phoneNumber) {
            yollaAppInventor("Telefon:" + phoneNumber);
          } else {
            yollaAppInventor("NumaraYok:" + user.displayName);
          }
        }).catch(function(error) {
          console.log("Popup engellendi, Redirect yöntemi deneniyor...", error.message);
          firebase.auth().signInWithRedirect(provider);
        });
    }
  </script>
</body>
</html>
