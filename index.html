<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Messenger Captcha Sistemi</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 15px; color: #333; font-size: 18px; }
        .input-group { margin-top: 15px; text-align: left; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; text-align: center; }
        
        /* Bizim Kelime Sözlüğü Alanı */
        .sozluk-box { background: #e9ecef; border: 2px dashed #6c757d; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .captcha-text { font-size: 19px; font-weight: bold; color: #d9534f; letter-spacing: 1px; margin-bottom: 10px; user-select: none; }
        
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #d9534f; font-size: 13px; margin-top: 5px; font-weight: 600; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>H-Messenger Güvenlik Doğrulaması</h2>
    <form id="captchaForm" onsubmit="dogrulamayiBaslat(event)">
        
        <div class="g-recaptcha"
             data-sitekey="SENIN_GOOGLE_SITE_KEYIN"
             data-callback="googleOnayVerdi"
             data-size="invisible">
        </div>

        <div class="sozluk-box" id="sozlukAlani">
            <p style="font-size: 13px; color: #666; margin-bottom: 8px;">Lütfen aşağıdaki kelimeleri kutuya aynen yazın:</p>
            <div class="captcha-text" id="generatedCaptcha"></div>
            <div class="input-group">
                <input type="text" id="captchaInput" placeholder="Sıfat + Zamir + Fiil">
                <div class="error-msg" id="hataMesaji">Kelimeler sözlükle eşleşmedi! Yenisi üretildi.</div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="islemButonu">Sistemi Doğrula</button>
    </form>
</div>

<script>
    // Ortak Dil Bilgisi Sözlüğümüz
    const sozluk = {
        sifatlar: ["Hızlı", "Mavi", "Yorgun", "Gizli", "Zeki", "Büyük", "Sessiz", "Sıcak"],
        zamirler: ["Ben", "Sen", "O", "Biz", "Siz", "Onlar", "Kendisi", "Herkes"],
        fiiller: ["Koştu", "Yazdı", "Gördü", "Güldü", "Bildi", "Geldi", "Baktı", "Çözdü"]
    };

    let uretilenCaptcha = "";
    let gOnay = false;
    let gToken = "";

    // Rastgele kombinasyon üreteç
    function kelimeUret() {
        const s = sozluk.sifatlar[Math.floor(Math.random() * sozluk.sifatlar.length)];
        const z = sozluk.zamirler[Math.floor(Math.random() * sozluk.zamirler.length)];
        const f = sozluk.fiiller[Math.floor(Math.random() * sozluk.fiiller.length)];
        return `${s} ${z} ${f}`;
    }

    // Butona basıldığında tetiklenen fonksiyon
    function dogrulamayiBaslat(event) {
        event.preventDefault();

        // Eğer Google henüz onay vermediyse önce görünmez reCAPTCHA çalışsın
        if (!gOnay) {
            grecaptcha.execute();
            return;
        }

        // Google onaylıysa bizim sözlük kontrolünü yap
        const hata = document.getElementById("hataMesaji");
        const girenVeri = document.getElementById("captchaInput").value.trim();

        if (girenVeri.toLowerCase() === uretilenCaptcha.toLowerCase()) {
            hata.style.display = "none";
            
            // Başarılı sonucu paketle
            const sonuc = {
                durum: "BASARILI",
                token: gToken,
                kelimeler: uretilenCaptcha
            };

            // Uygulamaya (WebViewString veya köprüye) gönder
            if (window.AppInventor) {
                window.AppInventor.setWebViewString(JSON.stringify(sonuc));
            } else if (window.AndroidInterface) {
                window.AndroidInterface.postMessage(JSON.stringify(sonuc));
            } else {
                alert("Doğrulama Tamamlandı!\n" + JSON.stringify(sonuc));
            }
        } else {
            hata.style.display = "block";
            document.getElementById("captchaInput").value = "";
            uretilenCaptcha = kelimeUret();
            document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        }
    }

    // Google reCAPTCHA v2 Invisible arka planda onay verince burası çalışır
    function googleOnayVerdi(token) {
        gOnay = true;
        gToken = token;

        // Bizim Sıfat+Zamir+Fiil kutusunu açıyoruz
        uretilenCaptcha = kelimeUret();
        document.getElementById("generatedCaptcha").innerText = uretilenCaptcha;
        document.getElementById("sozlukAlani").style.display = "block";
        
        const buton = document.getElementById("islemButonu");
        buton.innerText = "Kelimeleri Onayla";
        buton.style.backgroundColor = "#28a745";
    }
</script>

</body>
</html>
